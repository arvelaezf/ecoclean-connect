<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoClean · Mi ruta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #39A949;
    --verde-claro: #A3D556;
    --verde-oscuro: #1B5E34;
    --cian: #1BA2DB;
    --azul: #165A8F;
    --marino: #0B2A5C;
    --slogan: #4A769B;
    --crema: #f2f7f4;
    --tinta: #0B2A5C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', 'Segoe UI', sans-serif;
    background: var(--crema); color: var(--tinta); min-height: 100vh;
  }
  header {
    background: var(--marino); color: #fff; padding: 10px 16px;
    display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10;
  }
  header .logo-chip { height: 42px; background: #fff; border-radius: 10px; padding: 4px 8px; }
  header h1 { font-size: 1.05rem; font-weight: 600; flex: 1; }
  header .salir {
    background: transparent; color: #cfe3f5; border: 1.5px solid var(--slogan);
    border-radius: 8px; padding: 6px 12px; font-family: inherit; font-size: .78rem; cursor: pointer;
  }
  .resumen {
    background: #fff; border-bottom: 2px solid var(--tinta);
    padding: 12px 16px; font-size: .9rem; display: flex; justify-content: space-between; align-items: center;
  }
  .resumen b { color: var(--azul); font-size: 1.2rem; }
  #lista { padding: 14px; max-width: 560px; margin: 0 auto; }
  .parada {
    background: #fff; border: 2px solid var(--tinta); border-radius: 12px;
    box-shadow: 4px 4px 0 var(--verde); padding: 14px; margin-bottom: 16px;
    display: flex; gap: 12px;
  }
  .parada.hecha { opacity: .55; box-shadow: 4px 4px 0 #b9c7bd; }
  .orden {
    background: var(--marino); color: #fff; border-radius: 50%;
    min-width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1rem;
  }
  .info { flex: 1; min-width: 0; }
  .info .tipo { font-weight: 700; text-transform: capitalize; }
  .info .desc { font-size: .82rem; color: var(--slogan); margin: 2px 0; }
  .info .dir { font-size: .82rem; margin-bottom: 4px; }
  .info .datos { font-size: .8rem; color: var(--verde-oscuro); font-weight: 600; }
  .foto { width: 74px; height: 74px; object-fit: cover; border-radius: 8px; border: 1.5px solid var(--tinta); }
  .botones { display: flex; gap: 8px; margin-top: 10px; }
  .botones a, .botones button {
    flex: 1; padding: 10px; border-radius: 8px; font-family: inherit; font-weight: 700;
    font-size: .85rem; cursor: pointer; text-align: center; text-decoration: none;
  }
  .recoger { background: linear-gradient(90deg, var(--verde), var(--azul)); color: #fff; border: none; }
  .recoger:disabled { filter: grayscale(.6); cursor: wait; }
  .navegar { background: #fff; color: var(--azul); border: 1.5px solid var(--azul); }
  #vacio {
    text-align: center; padding: 60px 20px; color: var(--slogan); display: none;
  }
  #vacio .icono { font-size: 3rem; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="Eco Clean Connect" class="logo-chip">
  <h1>Mi ruta de hoy</h1>
  <button class="salir" onclick="location.href='ciudadano.html'" title="Portal ciudadano">🏠</button>
  <button class="salir" onclick="cerrarSesion()">Salir</button>
</header>

<div class="resumen">
  <span>Paradas pendientes</span>
  <b id="restantes">—</b>
</div>

<div id="lista"></div>
<div id="vacio">
  <div class="icono">🚛</div>
  <p><b>Sin ruta asignada por ahora.</b><br>Cuando el despachador optimice la ruta, tus paradas aparecerán aquí en orden.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://lfalktorfiodcjyhkynb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmYWxrdG9yZmlvZGNqeWhreW5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Nzk4ODgsImV4cCI6MjA5NjE1NTg4OH0.8Ublgykq5WhsKvKuyEChCJZEq7J7otQlR2Tm2hsUP84";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
const $ = id => document.getElementById(id);
const fmt = n => '$' + Number(n || 0).toLocaleString('es-CO');

// ---------- Autenticación: conductores (y admin para pruebas) ----------
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = 'login.html'; return; }
  const { data: p } = await sb.from('perfiles').select('rol').eq('id', session.user.id).single();
  if (!p || !['conductor', 'admin'].includes(p.rol)) location.href = 'login.html';
})();
async function cerrarSesion() { await sb.auth.signOut(); location.href = 'login.html'; }

// ---------- Cargar las paradas asignadas, en orden de ruta ----------
async function cargar() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/solicitudes?select=*&estado=eq.en_ruta&order=orden_ruta.asc`,
      { headers }
    );
    const paradas = await res.json();
    pintar(paradas);
  } catch (e) { console.error(e); }
}

function pintar(paradas) {
  $('restantes').textContent = paradas.length;
  $('vacio').style.display = paradas.length ? 'none' : 'block';
  const lista = $('lista');
  lista.innerHTML = '';

  for (const s of paradas) {
    const card = document.createElement('div');
    card.className = 'parada';
    card.innerHTML = `
      <div class="orden">${s.orden_ruta ?? '•'}</div>
      <div class="info">
        <div class="tipo">${s.tipo || 'residuo'}</div>
        <div class="desc">${(s.descripcion || '').slice(0, 70)}</div>
        <div class="dir">📍 ${s.direccion || 'Sin dirección'}</div>
        <div class="datos">${s.peso_kg ?? '?'} kg · cobrar ${fmt(s.precio_final)}</div>
        <div class="botones">
          <a class="navegar" target="_blank"
             href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=driving">🧭 Navegar</a>
          <button class="recoger" onclick="recoger('${s.id}', this)">✅ Recoger</button>
        </div>
      </div>
      ${s.foto_base64 ? `<img class="foto" src="data:image/jpeg;base64,${s.foto_base64}">` : ''}
    `;
    lista.appendChild(card);
  }
}

// ---------- Marcar parada como recogida ----------
async function recoger(id, btn) {
  btn.disabled = true;
  btn.textContent = '...';
  await fetch(`${SUPABASE_URL}/rest/v1/solicitudes?id=eq.${id}`, {
    method: 'PATCH', headers,
    body: JSON.stringify({ estado: 'recogido' })
  });
  cargar(); // la lista se reordena sola y el panel del admin lo verá en su refresco
}

cargar();
setInterval(cargar, 15000); // refresco: si el despachador asigna nuevas paradas, aparecen solas
</script>
</body>
</html>
